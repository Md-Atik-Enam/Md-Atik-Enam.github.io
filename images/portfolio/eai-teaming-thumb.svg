<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Embodied AI roles portfolio thumbnail</title>
  <desc id="desc">A summary thumbnail for a quantitative autonomous-vehicle AI teammate experiment with 498 valid responses and five latent profiles.</desc>
  <rect width="960" height="620" fill="#f8fafc"/>
  <rect x="42" y="42" width="876" height="536" rx="28" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>
  <rect x="42" y="42" width="876" height="132" rx="28" fill="#312e81"/>
  <path d="M42 146h876v32H42z" fill="#312e81"/>
  <text x="78" y="96" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Quantitative Experiment</text>
  <text x="78" y="137" fill="#e0e7ff" font-family="Segoe UI, Arial, sans-serif" font-size="20">AI teammate roles and influence styles in AV HMIs</text>

  <g transform="translate(78 220)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="330" height="252" rx="24" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="28" y="48" fill="#312e81" font-size="24" font-weight="800">3 x 3 design</text>
    <text x="28" y="86" fill="#374151" font-size="19">Role</text>
    <rect x="28" y="106" width="84" height="44" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="48" y="134" fill="#312e81" font-size="16" font-weight="700">Obs.</text>
    <rect x="124" y="106" width="84" height="44" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="139" y="134" fill="#312e81" font-size="16" font-weight="700">Collab.</text>
    <rect x="220" y="106" width="84" height="44" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="240" y="134" fill="#312e81" font-size="16" font-weight="700">Lead</text>
    <text x="28" y="186" fill="#374151" font-size="19">Style</text>
    <text x="28" y="220" fill="#4b5563" font-size="18">suggestive / facilitative / directive</text>
  </g>

  <g transform="translate(458 220)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="390" height="252" rx="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
