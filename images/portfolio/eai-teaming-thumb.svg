    <text x="124" y="58" fill="#1f2937" font-size="24" font-weight="700">valid responses</text>
    <path d="M30 92h330" stroke="#a5f3fc" stroke-width="2"/>
    <text x="28" y="138" fill="#0f766e" font-size="36" font-weight="800">5 profiles</text>
    <text x="28" y="176" fill="#374151" font-size="20">latent response groups</text>
    <text x="28" y="214" fill="#4b5563" font-size="18">trust, authority, human-likeness</text>
  </g>

  <g transform="translate(78 505)" font-family="Segoe UI, Arial, sans-serif">
    <text x="0" y="31" fill="#1f2937" font-size="22" font-weight="700">Project signal:</text>
    <text x="182" y="31" fill="#4b5563" font-size="22">experiment design, R analysis, segmentation</text>
